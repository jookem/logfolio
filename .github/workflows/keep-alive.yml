name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4' # Every Monday and Thursday at 8am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi
          # Strip trailing slash to avoid double-slash in URL
          SUPABASE_URL="${SUPABASE_URL%/}"
          echo "Pinging: ${SUPABASE_URL}/rest/v1/"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}") || true
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Response status: $STATUS"
          echo "Response body: $BODY"
          if [ -z "$STATUS" ] || [ "$STATUS" -ge 500 ]; then
            echo "Ping failed with status: '${STATUS}'"
            exit 1
          fi
          echo "Supabase is alive"
